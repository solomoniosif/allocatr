{% load static %}
<div
  id="tableHover"
  class="col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12 layout-spacing"
>
  <div class="statbox widget box box-shadow">
    <div class="widget-header">
      <div class="row">
        <div class="col-xl-9 col-lg-12 col-md-12 col-sm-12 col-12">
          <h4>Transactions</h4>
        </div>
      </div>
    </div>
    <div class="widget-content widget-content-area">
      <div class="table-responsive">
        <table class="table table-hover">
          <thead>
            <tr>
              <th scope="col" class="fw-bolder">Type</th>
              <th scope="col" class="fw-bolder">Transaction</th>
              <th class="text-center" scope="col" class="fw-bolder">Amount</th>
              <th scope="col" class="fw-bolder">Date</th>
              <th class="text-center" scope="col" class="fw-bolder">Account</th>
              <th class="text-center" scope="col" class="fw-bolder">Actions</th>
            </tr>
          </thead>
          <tbody>
            {% for tr in transactions %}
            <tr>
              <td>{{ tr.get_type_display }}</td>
              <td>{{ tr.title | title }}</td>
              <td
                class="text-center {% if tr.is_expense %} text-danger {% elif tr.is_income %} text-success {% elif tr.is_transfer %} text-info {% endif %}"
              >
                {{ tr.amount|floatformat:0 }}
                <i
                  class="{% if tr.is_expense %} ti-arrow-down {% elif tr.is_income %} ti-arrow-up {% elif tr.is_transfer %} ti-arrow-right {% endif %}"
                >
                </i>
              </td>
              <td>{{ tr.date }}</td>
              <td class="text-center">
                <span
                  class="badge text-dark"
                  style="background-color: {{ tr.account.color_on_dashboard }};"
                  ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="feather feather-credit-card"
                  >
                    <rect
                      x="1"
                      y="4"
                      width="22"
                      height="16"
                      rx="2"
                      ry="2"
                    ></rect>
                    <line x1="1" y1="10" x2="23" y2="10"></line></svg
                  >{{ tr.account }}</span
                >
              </td>
              <td class="text-center">
                <div class="action-btns">
                  <a
                    href="javascript:void(0);"
                    class="action-btn btn-view bs-tooltip me-2"
                    data-toggle="tooltip"
                    data-placement="top"
                    title="View"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="24"
                      height="24"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      class="feather feather-eye"
                    >
                      <path
                        d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                      ></path>
                      <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                  </a>
                  <a
                    href="javascript:void(0);"
                    class="action-btn btn-edit bs-tooltip me-2"
                    data-toggle="tooltip"
                    data-placement="top"
                    title="Edit"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="24"
                      height="24"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      class="feather feather-edit-2"
                    >
                      <path
                        d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"
                      ></path>
                    </svg>
                  </a>
                  <a
                    href="javascript:void(0);"
                    class="action-btn btn-delete bs-tooltip"
                    data-toggle="tooltip"
                    data-placement="top"
                    title="Delete"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="24"
                      height="24"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      class="feather feather-trash-2"
                    >
                      <polyline points="3 6 5 6 21 6"></polyline>
                      <path
                        d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
                      ></path>
                      <line x1="10" y1="11" x2="10" y2="17"></line>
                      <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                  </a>
                </div>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
